# Hardened Loki Configuration
# Root Cause Mitigation for Configuration Loss
# Recreated following simulated incident on 2026-03-20

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  # Register instrumentation handlers for Prometheus scraping
  register_instrumentation: true

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # HARDENING: Enforce retention policies for compliance
  retention_period: 72h # 3d
  allow_structured_metadata: true
  reject_old_samples: true
  reject_old_samples_max_age: 72h
  # HARDENING: Prevent ingestion overload
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20

compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  # HARDENING: Run compaction once per cycle
  compaction_interval: 10m

# HARDENING: Enable query frontend caching for performance
frontend:
  max_outstanding_per_tenant: 200
