# Hardened Prometheus Configuration
# Recreated following simulated deletion incident on 2026-03-20

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  # HARDENING: Prevent slow targets from hanging the scraper
  scrape_timeout: 10s

rule_files:
  # HARDENING: Dedicated rule file for Tempo health alerts
  - "/etc/prometheus/alert.rules"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"]

  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]

  # HARDENING: Add service discovery for backend financial services if applicable
